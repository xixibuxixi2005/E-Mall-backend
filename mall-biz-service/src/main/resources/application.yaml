server:
  port: 0
  servlet:
    context-path: /api
    multipart:
      max-file-size: 15MB
      max-request-size: 150MB

spring:
  application:
    name: mall-biz-service
  cloud:
    nacos:
      discovery:
        server-addr: ${HOST_IP:host.docker.internal}:8848
  datasource:
    url: "jdbc:mysql://${HOST_IP:host.docker.internal}:3306/emall"
    username: ${MYSQL_NAME}
    password: ${MYSQL_PSWD}
  data:
    redis:
      host: redis
      port: 6379
  mail:
    host: smtp.qq.com
    port: 465
    username: ${EMALL_MAIL_USERNAME}
    password: ${EMALL_MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail.smtp:
        auth: true
        ssl.enable: true


mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    enabled: true
    path: /biz/v3/api-docs

emall:
  static_path:
    doc: ./static/doc

minio:
  endpoint: http://127.0.0.1:9000
  access_key: minioadmin
  secret_key: minioadmin